audio:
  sample_rate: 32000
  clip_duration: 5
  n_mels: 128
  n_fft: 1024
  hop_length: 512
  fmin: 50
  fmax: 15000
  top_db: 80.0

model:
  base_channels: 32
  dropout: 0.3

training:
  epochs: 50
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 4
  detection_threshold: 0.5

augmentation:
  freq_mask_param: 20
  time_mask_param: 40
  noise_std: 0.005
  mixup_alpha: 0.4

paths:
  data_dir: data
  checkpoint_dir: checkpoints
  log_dir: logs
